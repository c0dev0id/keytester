name: Template Setup

on:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  setup:
    # Don't run on the original template repo itself
    if: github.repository != 'c0dev0id/andro-template'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check if substitution is needed
        id: check
        run: |
          if grep -qr "__TEMPLATE_NAME__" --include="*.kts" --include="*.md" --include="*.kt" --include="*.xml" .; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Substitute template variables
        if: steps.check.outputs.needed == 'true'
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          find . -type f \( -name "*.kts" -o -name "*.md" -o -name "*.kt" -o -name "*.xml" \) \
            ! -path "./.git/*" \
            ! -path "./.github/workflows/*" \
            -exec sed -i "s/__TEMPLATE_NAME__/${REPO_NAME}/g" {} +

      - name: Rename template directories
        if: steps.check.outputs.needed == 'true'
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          find . -type d -name "__TEMPLATE_NAME__" ! -path "./.git/*" | while read -r dir; do
            mv "$dir" "$(dirname "$dir")/${REPO_NAME}"
          done

      - name: Commit and push
        if: steps.check.outputs.needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: initialize project from template"
          git push
